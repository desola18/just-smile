<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JUST SMILE | Order Now</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #fffaf0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-primary { background-color: #ff69b4; border: none; }
        .btn-primary:hover { background-color: #ff1493; }
    </style>
</head>
<body>
    <div class="container py-5">
        <h1 class="text-center mb-4">✨ JUST SMILE ✨</h1>
        <p class="text-center text-muted">Choose a package to get started instantly.</p>
        
        <div class="row g-4">
            {% for pkg in packages %}
            <div class="col-md-6">
                <div class="card p-3 text-center">
                    <h3>{{ pkg.name }}</h3>
                    <p class="text-muted">{{ pkg.desc }}</p>
                    <h4 class="mb-3">₦{{ pkg.price }}</h4>
                    <a href="/order/{{ pkg.id }}" class="btn btn-primary w-100">Order & Pay Now</a>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
